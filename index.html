<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BoatBites Slides</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;

      position: fixed;
      inset: 0;

      display: grid;

      padding: 24px;
      color: #fff;
      font: 16px/1.5 Arial, sans-serif;
      text-align: center;
    }
    .fallback a {
      color: #fff;
    }
  </style>
</head>
<body>
  <object class="pdf-viewer" data="./BoatBites%20Full%20Version%20June%2010%202026%20(2).pdf#view=FitH&amp;toolbar=0&amp;navpanes=0" type="application/pdf">

  </div>

</html>
